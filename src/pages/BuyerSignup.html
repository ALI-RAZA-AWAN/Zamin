<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamin - Brand Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #fbf9f5; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .form-container { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        .logo { font-size: 2em; font-weight: 700; color: #ddbd91; text-transform: uppercase; margin-bottom: 20px; text-align: center; }
        h2 { margin-bottom: 25px; font-size: 1.5em; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; font-weight: 600; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
        
        /* Checkbox Styling */
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; border: 1px solid #eee; padding: 10px; border-radius: 4px; }
        .checkbox-item { display: flex; align-items: center; font-size: 0.85em; }
        .checkbox-item input { margin-right: 8px; width: auto; }

        .btn-submit { width: 100%; padding: 15px; background: #cea975; color: white; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .switch-link { text-align: center; margin-top: 20px; font-size: 0.9em; }
        .switch-link a { color: #c9ad86; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="logo">Zamin</div>
        <h2>Brand Registration</h2>
        <form id="buyerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="userName" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label>Brand Name</label>
                <input type="text" id="brandName" placeholder="Brand/Shop Name" required>
            </div>
            <div class="form-group">
                <label>Interested Categories (Select all that apply)</label>
                <div class="checkbox-group">
                    <div class="checkbox-item"><input type="checkbox" name="niche" value="tshirts"> T-shirts</div>
                    <div class="checkbox-item"><input type="checkbox" name="niche" value="polo"> Polo-shirts</div>
                    <div class="checkbox-item"><input type="checkbox" name="niche" value="hoodies"> Hoodies</div>
                    <div class="checkbox-item"><input type="checkbox" name="niche" value="denim"> Denim</div>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-submit">Join as Buyer</button>
        </form>
        <div class="switch-link">
            Already have an account? <a href="login.html">Login instead</a>
        </div>
    </div>

    <script>
        document.getElementById('buyerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const selectedNiches = Array.from(document.querySelectorAll('input[name="niche"]:checked')).map(cb => cb.value);
            console.log("Buyer Name:", document.getElementById('userName').value);
            console.log("Selected Niches:", selectedNiches);
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
