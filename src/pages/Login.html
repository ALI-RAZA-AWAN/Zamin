<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamin - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #fbf9f5; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .form-container { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .logo { font-size: 2.5em; font-weight: 700; color: #ddbd91; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
        h2 { margin-bottom: 25px; font-size: 1.2em; text-align: center; color: #888; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-login { width: 100%; padding: 15px; background: #4a4a4a; color: white; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: #333; }
        .error-msg { color: #ff4d4d; font-size: 0.85em; margin-top: 10px; display: none; text-align: center; }
        .footer-links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 0.85em; }
        .footer-links a { color: #c9ad86; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="logo">Zamin</div>
        <h2>WELCOME BACK</h2>
        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">LOGIN</button>
            <div id="error" class="error-msg">Incorrect Email or Password</div>
        </form>
        <div class="footer-links">
            <a href="#">Forgot Password?</a>
            <a href="index.html">Create Account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('error');

            if(email.includes('factory')) {
                window.location.href = 'manufacturer-dashboard.html';
            } else if(email.includes('brand')) {
                window.location.href = 'buyer-dashboard.html';
            } else {
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
