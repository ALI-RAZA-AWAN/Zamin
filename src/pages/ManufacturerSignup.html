<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamin - Factory Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #fbf9f5; font-family: 'Helvetica Neue', Arial, sans-serif; color: #444; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .form-container { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        .logo { font-size: 2em; font-weight: 700; color: #ddbd91; text-transform: uppercase; margin-bottom: 20px; text-align: center; }
        h2 { margin-bottom: 25px; font-size: 1.5em; text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1em; }
        .btn-submit { width: 100%; padding: 15px; background: #4a4a4a; color: white; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-submit:hover { background: #333; }
        .switch-link { text-align: center; margin-top: 20px; font-size: 0.9em; }
        .switch-link a { color: #c9ad86; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="logo">Zamin</div>
        <h2>Manufacturer Registration</h2>
        <form id="manufacturerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Factory Name</label>
                <input type="text" id="factoryName" placeholder="Enter factory name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Production Capacity (units/month)</label>
                <input type="number" id="capacity" placeholder="e.g. 5000" required>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="location" placeholder="City, Country" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-submit">Create Account</button>
        </form>
        <div class="switch-link">
            Already have an account? <a href="login.html">Login instead</a>
        </div>
    </div>

    <script>
        document.getElementById('manufacturerForm').addEventListener('submit', function(e) {
            e.preventDefault();
        
            const formData = {
                role: 'Manufacturer',
                username: document.getElementById('username').value,
                factoryName: document.getElementById('factoryName').value,
                email: document.getElementById('email').value,
                capacity: document.getElementById('capacity').value,
                location: document.getElementById('location').value
            };
            console.log("Manufacturer Data:", formData);
            alert("Registration successful! Waiting for Admin verification.");
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
