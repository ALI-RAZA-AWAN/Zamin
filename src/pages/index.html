<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamin - Find your Factory Partner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #4a4a4a; 
            overflow-x: hidden; 
        }

        .page-wrapper {
            background-color: #fbf9f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Changed from 100vh to min-height for responsiveness */
        }

        /* --- Updated Responsive Header/Navbar --- */
        header {
            padding: 30px 0; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allows navbar to wrap on small screens */
            gap: 20px;
        }

        .logo {
            font-size: 2.2em;
            font-weight: 700;
            color: #d8c3a5;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Playfair Display', serif;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #4a4a4a;
            font-size: 0.9em;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #d8c3a5;
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            padding: 40px 0;
        }

        .split-content {
            display: flex;
            align-items: center; 
            justify-content: space-between;
            gap: 60px;
        }

        .text-side {
            text-align: left;
            flex: 1;
        }

        .video-side {
            max-width: 300px; 
            width: 100%;
        }

        .video-side video {
            width: 100%;
            border-radius: 15px;
            display: block;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: clamp(2.2em, 5vw, 4em);
            color: #444;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        .path-selection {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .path-btn {
            padding: 14px 30px;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 700;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }

        .path-btn-buyer { 
            background: transparent; 
            color: #444; 
            border: 1px solid #ddd;
        }
        
        .path-btn-factory { 
            background: #4a4a4a; 
            color: #fff; 
            border: 1px solid #4a4a4a; 
        }

        .path-btn-factory:hover {
            background: #333;
            transform: translateY(-2px);
        }

        .social-proof {
            margin-top: 40px;
            color: #888;
            display: flex;
            gap: 15px;
            font-size: 0.85em;
        }

        /* --- Simple Footer --- */
        footer {
            padding: 40px 0;
            border-top: 1px solid #eee;
            text-align: center;
            margin-top: auto;
        }

        footer p {
            font-size: 0.85em;
            color: #999;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 992px) {
            header { justify-content: center; text-align: center; }
            .nav-links { width: 100%; justify-content: center; }
            .split-content {
                flex-direction: column-reverse;
                text-align: center;
                gap: 40px;
            }
            .text-side { text-align: center; }
            .path-selection { justify-content: center; flex-wrap: wrap; }
            .social-proof { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="container">
            
            <header>
                <a href="#" class="logo">Zamin</a>
                <nav class="nav-links">
                    <a href="#">About</a>
                    <a href="#">Explore</a>
                    <a href="/login.html">Login</a>
                </nav>
            </header>
            
            <div class="main-content">
                <div class="split-content">
                    
                    <div class="text-side">
                        <section class="hero">
                            <h1>Find the Factory <br> For Your Next Batch.</h1>
                        </section>

                        <section class="path-selection">
                            <a href="/BuyerSignup.html" class="path-btn path-btn-buyer">I am a Buyer</a>
                            <a href="/ManufacturerSignup.html" class="path-btn path-btn-factory">I am a Factory Owner</a>
                        </section>

                        <section class="social-proof">
                            <span>• T-shirts</span>
                            <span>• Polo-shirts</span>
                            <span>• Hoodies</span>
                        </section>
                    </div>

                    <div class="video-side">
                        <video autoplay muted loop playsinline>
                            <source src="/Zamin/public/landing.mp4" type="video/mp4">
                        </video>
                    </div>

                </div>
            </div>

            <footer>
                <p>&copy; 2026 Zamin Platform. Direct sourcing made simple for the garment industry.</p>
            </footer>

        </div> 
    </div> 
</body>
</html>
